<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signovate</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
    <button class="hamburger-btn" onclick="openMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <img src="assets/logo.png" alt="Signovate" style="height: 32px; position: absolute; left: 50%; transform: translateX(-50%);">
    <div class="topbar-right">
      <span class="topbar-stat">💎 <span id="diamonds-count">0</span></span>
      <span class="topbar-stat">🏆 <span id="trophies-count">0</span></span>
      <span class="streak" onclick="openStreakCalendar()" title="View streak" style="cursor:pointer;">
        🔥 <span id="streak-count">0</span>
      </span>
    </div>
  </div>

  <div class="container" style="max-width: 600px;">
    <h1 class="welcome-title" id="chapter-heading" style="font-size: 38px;">Good evening</h1>
    <p class="welcome-text" style="font-size: 17px;">Ready to keep learning?</p>

    <div class="home-stats-row" style="display:flex; gap:16px; margin: 28px 0 36px;">
      <div class="home-stat-card" onclick="openStreakCalendar()" style="flex:1; background:#fff; border-radius:20px; padding:22px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.06); cursor:pointer;">
        <div style="font-size:30px;">🔥</div>
        <div style="font-size:28px; font-weight:700; color:#0D9488;" id="home-streak">0</div>
        <div style="font-size:14px; color:#999;">Day streak</div>
      </div>
      <div class="home-stat-card" style="flex:1; background:#fff; border-radius:20px; padding:22px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="font-size:30px;">✋</div>
        <div style="font-size:28px; font-weight:700; color:#0D9488;" id="home-signs-learned">0</div>
        <div style="font-size:14px; color:#999;">Signs learned</div>
      </div>
      <div class="home-stat-card" style="flex:1; background:#fff; border-radius:20px; padding:22px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="font-size:30px;">📘</div>
        <div style="font-size:28px; font-weight:700; color:#0D9488;" id="home-modules-finished">0</div>
        <div style="font-size:14px; color:#999;">Modules finished</div>
      </div>
    </div>

    <p class="section-title" style="font-size: 16px; color: #555; font-weight: 700;">CONTINUE LEARNING</p>
    <div id="continue-card"></div>

    <div style="margin-top:32px; text-align:center;">
      <a href="chapters.html" style="color:#0D9488; font-weight:600; font-size:16px;">Browse all chapters →</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/streak.js"></script>
  <script src="js/menu.js"></script>
  <script>
    (function () {
      const hr = new Date().getHours();
      const greet = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
      const heading = document.getElementById('chapter-heading');
      if (heading) heading.textContent = greet;
    })();
  </script>
  <script>
  function renderContinueCard() {
    if (typeof modules === 'undefined' || !modules.length) return;

    let target = modules.find(m => m.progress > 0 && m.progress < m.signs.length);
    if (!target) {
      target = modules.find(m => m.progress === 0 && m.signs.length > 0);
    }

    const card = document.getElementById('continue-card');
    if (!card) return;

    if (!target) {
      const chapterId = (modules[0] && modules[0].chapter_id) || 1;
      const CHAPTER_TITLES = { 1: "Chapter 1", 2: "Chapter 2", 3: "Chapter 3", 4: "Chapter 4", 5: "Chapter 5" };
      const chapterName = CHAPTER_TITLES[chapterId] || "this chapter";

      card.innerHTML = `
        <div style="background:#fff; border-radius:18px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,0.06); text-align:center;">
          <div style="font-size:32px; margin-bottom:8px;">🎉</div>
          <div style="font-weight:700; font-size:19px; margin-bottom:6px; color:#1c1c1c;">You've mastered ${chapterName}!</div>
          <div style="font-size:14px; color:#666;">More chapters are on the way — check back soon.</div>
        </div>
      `;
      return;
    }

    const total = target.signs.length;
    const done  = target.progress;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
    const label = done > 0 ? 'Continue →' : 'Start →';
    const globalIndex = modules.indexOf(target);
    const chapterId = target.chapter_id || 1;

    card.innerHTML = `
      <div style="background:#fff; border-radius:18px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="font-weight:700; font-size:22px; margin-bottom:8px; color:#1c1c1c;">${target.emoji} ${target.name}</div>
        <div style="font-size:15px; color:#444; margin-bottom:18px;">${done}/${total} signs · ${pct}% done</div>
        <button class="primary-btn" style="width:100%; font-size:16px; padding:14px;" onclick="window.location.href='lesson.html?module=${globalIndex}&sign=${done}&chapter=${chapterId}'">${label}</button>
      </div>
    `;
  }

  function updateHomeAboutStats() {
    if (typeof modules === 'undefined' || !modules.length) return;

    const signsLearned = modules.reduce((t, m) => t + m.progress, 0);
    const modulesFinished = modules.filter(
      m => m.signs.length > 0 && m.progress === m.signs.length
    ).length;

    const signsEl = document.getElementById('home-signs-learned');
    const modsEl  = document.getElementById('home-modules-finished');
    if (signsEl) signsEl.textContent = signsLearned;
    if (modsEl)  modsEl.textContent  = modulesFinished;
  }

  window.initModules = function () {
    renderContinueCard();
    updateHomeAboutStats();
  };

  document.addEventListener('DOMContentLoaded', function () {
    if (typeof loadModulesFromBackend === 'function') {
      loadModulesFromBackend();
    }
  });
  </script>

</body>
</html>
