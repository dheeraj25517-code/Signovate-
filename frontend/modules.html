<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modules</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
  <button class="hamburger-btn" onclick="openMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <img src="assets/logo.png" alt="Signovate" style="height: 32px; position: absolute; left: 50%; transform: translateX(-50%);">
  <div class="topbar-right">
    <span class="topbar-stat">💎 <span id="diamonds-count">0</span></span>
    <span class="topbar-stat">🏆 <span id="trophies-count">0</span></span>
    <span class="streak" onclick="openStreakCalendar()" title="View streak">
      🔥 <span id="streak-count">0</span>
    </span>
  </div>
</div>

  <div class="container">
    <div style="margin-bottom: 16px;">
      <button class="back-btn" onclick="window.location.href='chapters.html'">← Chapters</button>
    </div>

    <h1 class="welcome-title" id="chapter-heading">Chapter Modules</h1>
    <p class="welcome-text" id="chapter-sub">Complete each module in order to progress.</p>

    <div class="stat-row" style="grid-template-columns: 1fr;">
      <div class="stat-card">
        <div class="stat-val" id="modules-done">0 / 0</div>
        <div class="stat-lbl">Modules done</div>
      </div>
    </div>

    <p class="section-title">MODULES</p>
    <div id="modules-list"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/streak.js"></script>
  <script src="js/menu.js"></script>
  <script>
    (function () {
      const CHAPTER_NAMES = {
        1: { title: "Chapter 1 — Greetings",        sub: "Learn to greet people in Indian Sign Language." },
        2: { title: "Chapter 2 — Numbers & Colours", sub: "Count and describe the world around you." },
        3: { title: "Chapter 3 — Family",            sub: "Signs for the people who matter most." },
        4: { title: "Chapter 4 — Daily Life",        sub: "Routines, food, and time." },
        5: { title: "Chapter 5 — School & Work",     sub: "Education and workplace vocabulary." },
      };
      const id   = parseInt(new URLSearchParams(window.location.search).get('chapter')) || 1;
      const info = CHAPTER_NAMES[id] || CHAPTER_NAMES[1];
      const heading = document.getElementById('chapter-heading');
      const sub     = document.getElementById('chapter-sub');
      if (heading) heading.textContent = info.title;
      if (sub)     sub.textContent     = info.sub;
    })();
  </script>

</body>
</html>
